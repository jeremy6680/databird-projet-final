# ─────────────────────────────────────────────────────────────
# Deployment : airflow-scheduler
# Planifie les tâches et les exécute (LocalExecutor = dans ce même process)
# ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-scheduler
  namespace: airflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-scheduler
  template:
    metadata:
      labels:
        app: airflow-scheduler
    spec:
      initContainers:
        - name: wait-for-db
          image: airflow-projet:latest
          imagePullPolicy: Never
          command: ['sh', '-c', 'until airflow db check; do echo "DB pas prête..."; sleep 5; done']
          envFrom:
            - configMapRef:
                name: airflow-config
            - secretRef:
                name: airflow-secrets

      containers:
        - name: airflow-scheduler
          image: airflow-projet:latest
          imagePullPolicy: Never
          args: ["scheduler"]
          envFrom:
            - configMapRef:
                name: airflow-config
            - secretRef:
                name: airflow-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8974
            initialDelaySeconds: 30
            periodSeconds: 30
