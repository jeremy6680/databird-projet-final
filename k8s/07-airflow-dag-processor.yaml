# ─────────────────────────────────────────────────────────────
# Deployment : airflow-dag-processor
# NOUVEAU en Airflow 3.x : parse les fichiers Python des DAGs
# et les enregistre en base. Sans lui, aucun DAG n'apparaît dans l'UI.
# ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-dag-processor
  namespace: airflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-dag-processor
  template:
    metadata:
      labels:
        app: airflow-dag-processor
    spec:
      initContainers:
        - name: wait-for-db
          image: airflow-projet:latest
          imagePullPolicy: Never
          command: ['sh', '-c', 'until airflow db check; do echo "DB pas prête..."; sleep 5; done']
          envFrom:
            - configMapRef:
                name: airflow-config
            - secretRef:
                name: airflow-secrets

      containers:
        - name: airflow-dag-processor
          image: airflow-projet:latest
          imagePullPolicy: Never
          args: ["dag-processor"]
          envFrom:
            - configMapRef:
                name: airflow-config
            - secretRef:
                name: airflow-secrets
