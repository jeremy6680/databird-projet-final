# ─────────────────────────────────────────────────────────────
# Deployment : airflow-triggerer
# Gère les Deferrable Operators (tâches asynchrones non-bloquantes)
# Exemple : attendre un fichier GCS sans monopoliser un worker
# ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-triggerer
  namespace: airflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-triggerer
  template:
    metadata:
      labels:
        app: airflow-triggerer
    spec:
      initContainers:
        - name: wait-for-db
          image: airflow-projet:latest
          imagePullPolicy: Never
          command: ['sh', '-c', 'until airflow db check; do echo "DB pas prête..."; sleep 5; done']
          envFrom:
            - configMapRef:
                name: airflow-config
            - secretRef:
                name: airflow-secrets

      containers:
        - name: airflow-triggerer
          image: airflow-projet:latest
          imagePullPolicy: Never
          args: ["triggerer"]
          envFrom:
            - configMapRef:
                name: airflow-config
            - secretRef:
                name: airflow-secrets
