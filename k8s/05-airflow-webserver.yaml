# ─────────────────────────────────────────────────────────────
# Deployment : airflow-webserver (api-server en Airflow 3.x)
# Sert l'UI React + l'API REST sur le port 8080
# Équivalent du service "airflow-webserver: command: api-server" dans docker-compose
# ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-webserver
  namespace: airflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-webserver
  template:
    metadata:
      labels:
        app: airflow-webserver
    spec:
      initContainers:
        - name: wait-for-db
          image: airflow-projet:latest
          imagePullPolicy: Never
          command: ['sh', '-c', 'until airflow db check; do echo "DB pas prête..."; sleep 5; done']
          envFrom:
            - configMapRef:
                name: airflow-config
            - secretRef:
                name: airflow-secrets

      containers:
        - name: airflow-webserver
          image: airflow-projet:latest
          imagePullPolicy: Never
          args: ["api-server"]   # Équivalent de "command: api-server" dans docker-compose
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: airflow-config
            - secretRef:
                name: airflow-secrets
          readinessProbe:
            httpGet:
              path: /api/v2/monitor/health   # Airflow 3.x a déplacé /health ici
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v2/monitor/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30

---
# ─────────────────────────────────────────────────────────────
# Service : expose le webserver à l'intérieur du cluster
# "airflow-webserver-svc" est le nom DNS utilisé dans le ConfigMap
# pour AIRFLOW__CORE__INTERNAL_API_URL et EXECUTION_API_SERVER_URL
# ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: airflow-webserver-svc
  namespace: airflow
spec:
  selector:
    app: airflow-webserver
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
